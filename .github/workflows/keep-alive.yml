name: Keep Alive

on:
  schedule:
    - cron: "*/14 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Selfy API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://selfy-yu0z.onrender.com/)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: API returned $STATUS"
          fi
